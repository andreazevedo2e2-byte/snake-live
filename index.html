<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Live</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(circle at 50% 18%, rgba(116, 255, 24, 0.13), transparent 24%),
          linear-gradient(180deg, #020403 0%, #040804 100%);
        height: 100%;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app canvas {
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 9 / 16;
        image-rendering: auto;
        filter: drop-shadow(0 0 22px rgba(116, 255, 24, 0.18));
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
