<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Live</title>
    <style>
      html, body {
        --snake-accent-hue: 205;
        margin: 0;
        padding: 0;
        background:
          radial-gradient(circle at 50% 18%, hsla(var(--snake-accent-hue), 95%, 58%, 0.2), transparent 24%),
          linear-gradient(90deg, hsla(var(--snake-accent-hue), 92%, 22%, 0.72), transparent 22%, transparent 78%, hsla(var(--snake-accent-hue), 92%, 22%, 0.72)),
          linear-gradient(180deg, hsla(var(--snake-accent-hue), 85%, 10%, 0.38), transparent 45%, hsla(var(--snake-accent-hue), 85%, 10%, 0.38)),
          linear-gradient(180deg, #020403 0%, #040804 100%);
        height: 100%;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app canvas {
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 9 / 16;
        image-rendering: auto;
        filter: drop-shadow(0 0 22px hsla(var(--snake-accent-hue), 95%, 58%, 0.22));
      }
      #settings-toggle {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 12;
        width: 22px;
        height: 22px;
        border: 1px solid rgba(105, 210, 12, 0.12);
        border-radius: 999px;
        background: rgba(5, 9, 5, 0.2);
        color: rgba(183, 255, 77, 0.54);
        font: 900 11px Arial, Helvetica, sans-serif;
        padding: 0;
        cursor: pointer;
        backdrop-filter: blur(2px);
        opacity: 0.68;
      }
      #settings-panel {
        position: fixed;
        top: max(60px, calc(50vh - min(50vh, 88.889vw) + 74px));
        left: calc(50vw - min(28.125vh, 50vw) + 20px);
        width: min(290px, 42vw);
        max-height: min(720px, 74vh);
        overflow: auto;
        z-index: 12;
        border: 1px solid rgba(105, 210, 12, 0.72);
        border-radius: 8px;
        background: rgba(5, 9, 5, 0.94);
        color: #f6ffe7;
        padding: 12px;
        box-shadow: 0 0 20px rgba(116, 255, 24, 0.16);
        display: none;
        font: 800 12px Arial, Helvetica, sans-serif;
      }
      #settings-panel.is-open {
        display: block;
      }
      #settings-panel h2 {
        margin: 0 0 10px;
        color: #c8ff53;
        font: 900 14px Arial, Helvetica, sans-serif;
        letter-spacing: 0.08em;
      }
      .settings-grid {
        display: grid;
        gap: 10px;
      }
      .settings-grid label,
      .settings-grid fieldset {
        display: grid;
        gap: 6px;
        border: 0;
        margin: 0;
        padding: 0;
      }
      .settings-grid span,
      .settings-grid legend {
        color: #9bf942;
        font-size: 11px;
        letter-spacing: 0.06em;
      }
      .settings-grid select,
      .settings-grid input[type="number"],
      .settings-grid input[type="range"] {
        width: 100%;
        box-sizing: border-box;
        border-radius: 6px;
        border: 1px solid rgba(105, 210, 12, 0.45);
        background: rgba(15, 25, 12, 0.95);
        color: #ffffff;
        padding: 7px 8px;
      }
      .settings-grid input[type="checkbox"] {
        accent-color: #b7ff4d;
      }
      .settings-grid .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .settings-grid .checks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 10px;
      }
      .settings-grid .checks label {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #f3ffd4;
      }
      #settings-apply {
        border: 0;
        border-radius: 6px;
        background: #b7ff4d;
        color: #051005;
        padding: 10px 12px;
        font: 900 12px Arial, Helvetica, sans-serif;
        letter-spacing: 0.08em;
        cursor: pointer;
      }
      .settings-note {
        color: rgba(242, 255, 220, 0.72);
        font-size: 10px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <button id="settings-toggle" type="button" aria-label="Abrir configurações">&#9881;</button>
    <form id="settings-panel">
      <h2>CONFIGURAÇÕES</h2>
      <div class="settings-grid">
        <label>
          <span>Mapa</span>
          <select id="setting-map">
            <option value="classic">Clássico</option>
            <option value="heart">Coração</option>
              <option value="brazil">Bandeira do Brasil</option>
              <option value="france">Bandeira da França</option>
              <option value="norway">Bandeira da Noruega</option>
              <option value="creeper">Creeper</option>
          </select>
        </label>
        <label>
          <span>Modo</span>
          <select id="setting-mode">
            <option value="classic">Clássico</option>
            <option value="full_food">Mapa cheio</option>
            <option value="maze_race">Labirinto final</option>
            <option value="maze_harvest">Labirinto contínuo</option>
            <option value="pudding">Blocos dinâmicos</option>
          </select>
        </label>
        <label>
          <span>Cores</span>
          <select id="setting-colors">
            <option value="gradient">Gradiente da cobra</option>
            <option value="map">Cores do mapa</option>
          </select>
        </label>
        <label>
          <span>Interface</span>
          <select id="setting-interface">
            <option value="live">Live</option>
              <option value="shorts">Video</option>
          </select>
        </label>
        <label>
          <span>Estilo da cobra</span>
          <select id="setting-snake">
            <option value="smooth">Suave</option>
            <option value="google">Google Snake</option>
          </select>
        </label>
        <label>
          <span>Progressão do speed do chat</span>
          <select id="setting-comment-speed-mode">
            <option value="gradual">Aumentar gradualmente</option>
            <option value="fixed">Travar no valor inicial</option>
          </select>
        </label>
        <label>
          <span>Speed inicial do chat</span>
          <select id="setting-comment-speed-start">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="5">5x</option>
            <option value="6">6x</option>
          </select>
        </label>
        <label>
          <span>Volume do jogo</span>
          <input id="volume-slider" type="range" min="0" max="100" value="60" />
        </label>
        <fieldset>
          <legend>Comidas</legend>
          <div class="checks">
            <label><input id="food-apple-red" type="checkbox" checked />Maçã vermelha</label>
            <label><input id="food-apple-gold" type="checkbox" />Maçã dourada</label>
            <label><input id="food-bread" type="checkbox" />Pão</label>
            <label><input id="food-watermelon" type="checkbox" />Melancia</label>
          </div>
        </fieldset>
        <div class="row">
          <label>
            <span>Largura inicial</span>
            <input id="setting-width" type="number" min="8" max="36" step="1" value="10" />
          </label>
          <label>
            <span>Altura inicial</span>
            <input id="setting-height" type="number" min="6" max="24" step="1" value="8" />
          </label>
        </div>
        <label>
          <span>Modo crescimento</span>
          <div class="checks">
            <label><input id="setting-growth" type="checkbox" />Aumentar o mapa após cada vitória</label>
          </div>
        </label>
        <label>
          <span>Ritmo da partida</span>
          <select id="setting-speed">
            <option value="0.8">0.8x</option>
            <option value="1" selected>1x</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </label>
        <label>
          <span>Velocidade do gradiente</span>
          <select id="setting-gradient">
            <option value="0.01">10%</option>
            <option value="0.03">30%</option>
            <option value="0.04" selected>40%</option>
            <option value="0.06">60%</option>
            <option value="0.08">80%</option>
            <option value="0.12">100%</option>
          </select>
        </label>
        <label>
          <span>Taxa de erro</span>
          <select id="setting-errors">
            <option value="0">0%</option>
            <option value="5">5%</option>
            <option value="10">10%</option>
            <option value="20" selected>20%</option>
            <option value="30">30%</option>
            <option value="40">40%</option>
            <option value="50">50%</option>
          </select>
        </label>
        <div class="settings-note">
          Mapa cheio preenche tudo com comida. Labirinto final leva a uma fruta-alvo. Blocos dinâmicos criam obstáculos novos durante a partida.
        </div>
        <button id="settings-apply" type="submit">APLICAR E REINICIAR</button>
      </div>
    </form>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
